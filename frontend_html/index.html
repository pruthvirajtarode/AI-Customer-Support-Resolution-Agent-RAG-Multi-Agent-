<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupportAI SaaS - Customer Support Resolution</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="app.js"></script>
</head>
<body>
    <header>
        <h1>SupportAI SaaS</h1>
        <nav>
            <ul>
                <li><a href="#login">Login</a></li>
                <li><a href="#signup">Signup</a></li>
                <li><a href="#dashboard">Dashboard</a></li>
                <li><a href="#upload">Upload Policy</a></li>
                <li><a href="#ticket">Submit Ticket</a></li>
                <li><a href="#responses">Responses</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="login" class="panel">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <div id="loginMsg"></div>
        </section>
        <section id="signup" class="panel">
            <h2>Signup</h2>
            <form id="signupForm">
                <input type="text" id="signupName" placeholder="Name" required>
                <input type="email" id="signupEmail" placeholder="Email" required>
                <input type="password" id="signupPassword" placeholder="Password" required>
                <button type="submit">Register</button>
            </form>
            <div id="signupMsg"></div>
        </section>
        <section id="dashboard" class="panel">
            <h2>Dashboard</h2>
            <div id="dashboardContent">Welcome to SupportAI SaaS!</div>
        </section>
        <section id="upload" class="panel">
            <h2>Upload Policy Document</h2>
            <form id="uploadForm">
                <input type="file" id="policyFile" accept=".txt,.pdf" required>
                <button type="submit">Upload</button>
            </form>
            <div id="uploadMsg"></div>
        </section>
        <section id="ticket" class="panel">
            <h2>Submit Ticket</h2>
            <form id="ticketForm">
                <textarea id="ticketText" placeholder="Ticket Text" required></textarea>
                <textarea id="orderJson" placeholder='Order Context (JSON)' required></textarea>
                <button type="submit">Submit Ticket</button>
            </form>
            <div id="ticketMsg"></div>
        </section>
        <section id="responses" class="panel">
            <h2>AI Responses</h2>
            <button id="loadResponses">Load Responses</button>
            <div id="responsesContent"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 SupportAI SaaS. All rights reserved.</p>
    </footer>
</body>
</html>
